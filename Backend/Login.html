<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microgoal | Auth</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg-gradient); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; color: #f8fafc;
        }

        .auth-container { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            padding: 40px; border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            width: 380px; 
        }

        .tabs { display: flex; background: rgba(0, 0, 0, 0.2); padding: 4px; border-radius: 14px; margin-bottom: 24px; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: #94a3b8; font-size: 14px; font-weight: 600; border-radius: 10px; transition: 0.3s; }
        .tab.active { background: rgba(255, 255, 255, 0.1); color: white; }

        .input-group { margin-bottom: 16px; position: relative; }

        input { 
            width: 100%; padding: 14px 16px; 
            background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; box-sizing: border-box; font-size: 15px; color: white; outline: none;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2); }

        /* Password Toggle Styling */
        .password-wrapper { position: relative; }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }
        .toggle-password:hover { color: white; }

        button { 
            width: 100%; padding: 14px; background: var(--primary); 
            color: white; border: none; border-radius: 12px; 
            cursor: pointer; font-size: 16px; font-weight: 700; margin-top: 10px; 
        }

        #message { margin-top: 20px; text-align: center; font-size: 14px; min-height: 20px; padding: 10px; border-radius: 8px; }
        .error { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .success { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2 style="text-align: center; margin-bottom: 8px;">Microgoal</h2>
    <p style="text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 30px;" id="formSubtitle">Create your account</p>
    
    <div class="tabs">
        <div id="signupTab" class="tab active" onclick="switchTab('signup')">Sign Up</div>
        <div id="loginTab" class="tab" onclick="switchTab('login')">Login</div>
    </div>

    <form id="authForm">
        <div id="nameGroup" class="input-group">
            <input type="text" id="name" placeholder="Full Name">
        </div>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address" required>
        </div>
        
        <div class="input-group password-wrapper">
            <input type="password" id="password" placeholder="Password" required>
            <span class="toggle-password" onclick="togglePasswordVisibility()">
                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </span>
        </div>
        
        <button type="submit" id="submitBtn">Create Account</button>
    </form>

    <div id="message"></div>
</div>

<script>
    let currentMode = 'signup';

    function switchTab(mode) {
        currentMode = mode;
        const nameGroup = document.getElementById('nameGroup');
        const submitBtn = document.getElementById('submitBtn');
        const subtitle = document.getElementById('formSubtitle');

        document.getElementById('signupTab').classList.toggle('active', mode === 'signup');
        document.getElementById('loginTab').classList.toggle('active', mode === 'login');
        
        if (mode === 'signup') {
            nameGroup.classList.remove('hidden');
            submitBtn.textContent = 'Create Account';
            subtitle.textContent = 'Create your account to get started';
        } else {
            nameGroup.classList.add('hidden');
            submitBtn.textContent = 'Login';
            subtitle.textContent = 'Welcome back! Please login';
        }
    }

    // Toggle Password Function
    function togglePasswordVisibility() {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            // Change SVG to "Eye Off" look
            eyeIcon.innerHTML = '<line x1="1" y1="1" x2="23" y2="23"></line><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>';
        } else {
            passwordInput.type = 'password';
            // Change SVG back to "Eye" look
            eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        }
    }

    document.getElementById('authForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const messageDiv = document.getElementById('message');
        const btn = document.getElementById('submitBtn');
        
        btn.textContent = 'Processing...';

        const payload = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };
        
        if (currentMode === 'signup') {
            payload.name = document.getElementById('name').value;
        }

        try {
            const response = await fetch(`http://localhost:8000/api/auth/${currentMode}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

           // Ensure your fetch URL above looks like this:
// const response = await fetch(`http://localhost:8000/api/auth/${currentMode}`, { ...

if (response.ok && data.success) {
    // 1. Store the token for the "per user" session
    localStorage.setItem('token', data.token);
    
    // 2. Visual feedback
    messageDiv.className = 'success';
    messageDiv.textContent = currentMode === 'signup' ? "Account created successfully!" : "Login successful!";
    
    // 3. Redirect to the dashboard after a short delay
    setTimeout(() => {
        window.location.href = '/microgoal';
    }, 1200);
} else {
    // Show the specific error message from the backend (e.g., "Invalid password")
    messageDiv.className = 'error';
    messageDiv.textContent = data.message || "Request failed.";
}
        } catch (err) {
            messageDiv.className = 'error';
            messageDiv.textContent = "Server offline. Check Backend.";
        } finally {
            btn.textContent = currentMode === 'signup' ? 'Create Account' : 'Login';
        }
    });
</script>

</body>
</html>
